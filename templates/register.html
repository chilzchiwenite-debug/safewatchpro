{% extends "base.html" %}

{% block content %}

<div style="max-width:420px; margin:40px auto; padding:20px; background:#fff; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);">

    <h2 style="text-align:center; color:green;">Create Account</h2>

    <form method="POST">

        <label>Username</label>
        <input 
            type="text" 
            name="username" 
            required 
            style="width:100%; padding:10px; margin:8px 0;"
        >

        <label>Email</label>
        <input 
            type="email" 
            name="email" 
            required 
            style="width:100%; padding:10px; margin:8px 0;"
        >

        <label>Password</label>
        <input 
            type="password" 
            name="password" 
            required 
            style="width:100%; padding:10px; margin:8px 0;"
        >

        <button 
            type="submit" 
            style="width:100%; padding:10px; background:green; color:white; border:none; border-radius:5px;"
        >
            Register
        </button>

    </form>

    <p style="text-align:center; margin-top:15px;">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
    </p>

</div>

{% endblock %}

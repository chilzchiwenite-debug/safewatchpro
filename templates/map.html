{% extends "base.html" %}

{% block content %}

<h2>🗺️ Live Incident Map</h2>

<div id="map" style="height:500px; width:100%;"></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Initialize map (Nigeria)
var map = L.map('map').setView([9.0820, 8.6753], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'SafeWatch Pro'
}).addTo(map);

// FIX: We must use dashboard reports via API (we will create it if missing)
fetch("/api/reports")
.then(res => res.json())
.then(data => {

    data.forEach(r => {

        let color = "green";

        if (r.severity === "high") {
            color = "red";
        } else if (r.severity === "medium") {
            color = "orange";
        }

        L.circleMarker([r.latitude, r.longitude], {
            radius: 8,
            color: color,
            fillOpacity: 0.8
        })
        .addTo(map)
        .bindPopup(
            "<b>" + r.title + "</b><br>" +
            "Category: " + r.category + "<br>" +
            "Severity: " + r.severity + "<br>" +
            "Date: " + r.created_at
        );

    });

});
</script>

{% endblock %}

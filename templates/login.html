{% extends "base.html" %}

{% block content %}

<h2>Login</h2>

<form method="POST">
    <input name="email" placeholder="Email" required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
    <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
</form>

{% endblock %}
